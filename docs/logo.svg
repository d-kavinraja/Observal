<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <!-- Icon: telescope -->
  <g transform="translate(20, 12)">
    <!-- Telescope tube -->
    <rect x="30" y="28" width="48" height="18" rx="4" fill="url(#g1)" transform="rotate(-30, 54, 37)"/>
    <!-- Lens (front) -->
    <circle cx="22" cy="22" r="14" fill="none" stroke="url(#g1)" stroke-width="4"/>
    <circle cx="22" cy="22" r="6" fill="url(#g1)" opacity="0.7"/>
    <!-- Eyepiece (back) -->
    <rect x="68" y="48" width="10" height="14" rx="2" fill="url(#g1)" opacity="0.8" transform="rotate(-30, 73, 55)"/>
    <!-- Tripod legs -->
    <line x1="50" y1="52" x2="32" y2="88" stroke="#6366f1" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
    <line x1="50" y1="52" x2="68" y2="88" stroke="#6366f1" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
    <line x1="50" y1="52" x2="50" y2="90" stroke="#6366f1" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
    <!-- Star sparkles -->
    <circle cx="8" cy="10" r="1.5" fill="#8b5cf6" opacity="0.5"/>
    <circle cx="16" cy="4" r="1" fill="#6366f1" opacity="0.4"/>
    <circle cx="4" cy="20" r="1" fill="#8b5cf6" opacity="0.3"/>
  </g>
  <!-- Wordmark -->
  <text x="136" y="76" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="52" font-weight="700" fill="#e2e8f0" letter-spacing="-1">Observal</text>
</svg>
