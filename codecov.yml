coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
    patch:
      default:
        target: 80%
        informational: true

ignore:
  - "tests/"
  - "ee/"
  - "web/"
  - "demo/"
  - "alembic/"
  - "observal-server/services/insights/"
