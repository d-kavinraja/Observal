[project]
name = "observal-shared"
version = "1.6.1"
description = "Shared Observal helpers"
requires-python = ">=3.11"
license = "AGPL-3.0-only"
dependencies = [
    "asyncpg>=0.29.0",
    "httpx>=0.27.0",
    "loguru>=0.7.0",
    "pyarrow>=15.0.0",
    "pyyaml>=6.0.3",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["observal_shared"]
