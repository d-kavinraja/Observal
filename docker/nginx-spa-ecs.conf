# ECS-optimised SPA config — no proxy_pass directives.
#
# In ECS Fargate, the ALB routes /api/* and /auth/* to the API target group
# before they reach the web container. The web task only serves static assets
# and SPA fallback. Docker Compose hostnames (observal-api) do not exist here,
# so any proxy_pass would cause nginx to crash at startup.

server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' https: wss:; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Static assets with aggressive caching (fingerprinted by Vite)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' https: wss:; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # SPA fallback — all non-file requests serve index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}
