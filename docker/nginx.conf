upstream observal_api {
    server observal-api:8000;
}

upstream observal_web {
    server observal-web:3000;
}

server {
    listen 80;

    # Reject requests with non-RFC-compliant Host headers (CVE-2026-48710 mitigation)
    if ($http_host !~* "^[a-z0-9]([a-z0-9\-\.]*[a-z0-9])?(:\d{1,5})?$") {
        return 400;
    }

    gzip on;
    gzip_types application/json application/javascript text/css text/plain text/xml application/xml;
    gzip_min_length 256;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;

    # Reconcile endpoint receives full session JSONL — allow up to 10MB
    client_max_body_size 10m;

    # Block operational metadata paths at the proxy layer (SEC-017).
    location ~* ^/(docs|redoc|openapi\.json|metrics) {
        return 404;
    }

    # API routes
    location /api/ {
        proxy_pass http://observal_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /health {
        proxy_pass http://observal_api;
        proxy_set_header Host $host;
    }

    # Frontend (Vite SPA via nginx)
    location / {
        proxy_pass http://observal_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
