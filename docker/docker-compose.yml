services:
  observal-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN:-}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      # Enterprise deployment mode
      - DEPLOYMENT_MODE=${DEPLOYMENT_MODE:-local}
      # Demo accounts (seeded on first startup when no real users exist)
      - DEMO_SUPER_ADMIN_EMAIL=${DEMO_SUPER_ADMIN_EMAIL:-super@demo.local}
      - DEMO_SUPER_ADMIN_PASSWORD=${DEMO_SUPER_ADMIN_PASSWORD:-super-changeme}
      - DEMO_ADMIN_EMAIL=${DEMO_ADMIN_EMAIL:-admin@demo.local}
      - DEMO_ADMIN_PASSWORD=${DEMO_ADMIN_PASSWORD:-admin-changeme}
      - DEMO_REVIEWER_EMAIL=${DEMO_REVIEWER_EMAIL:-reviewer@demo.local}
      - DEMO_REVIEWER_PASSWORD=${DEMO_REVIEWER_PASSWORD:-reviewer-changeme}
      - DEMO_USER_EMAIL=${DEMO_USER_EMAIL:-user@demo.local}
      - DEMO_USER_PASSWORD=${DEMO_USER_PASSWORD:-user-changeme}
    depends_on:
      observal-db:
        condition: service_healthy
      observal-clickhouse:
        condition: service_healthy
      observal-redis:
        condition: service_healthy
    networks:
      - observal-net

  observal-db:
    image: postgres:16
    ports:
      - "5432:5432"
    env_file:
      - ../.env
    environment:
      POSTGRES_DB: observal
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - observal-net

  observal-clickhouse:
    image: clickhouse/clickhouse-server:latest
    ports:
      - "8123:8123"
    env_file:
      - ../.env
    environment:
      CLICKHOUSE_DB: observal
    volumes:
      - chdata:/var/lib/clickhouse
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1'"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - observal-net

  observal-redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - observal-net

  observal-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    command: ["uv", "run", "arq", "worker.WorkerSettings"]
    env_file:
      - ../.env
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN:-}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - DEPLOYMENT_MODE=${DEPLOYMENT_MODE:-local}
    depends_on:
      observal-db:
        condition: service_healthy
      observal-redis:
        condition: service_healthy
      observal-clickhouse:
        condition: service_started
    networks:
      - observal-net

  observal-web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://observal-api:8000
    depends_on:
      - observal-api
    networks:
      - observal-net

  observal-otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config", "/etc/otelcol/config.yaml"]
    restart: on-failure
    ports:
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ../otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
    depends_on:
      observal-clickhouse:
        condition: service_healthy
    networks:
      - observal-net

volumes:
  pgdata:
  chdata:
  redisdata:

networks:
  observal-net:
    driver: bridge
