# Gitleaks configuration
# https://github.com/gitleaks/gitleaks

title = "Observal Gitleaks Config"

[allowlist]
  description = "Global allowlist"
  paths = [
    '''(^|\/)\.?pnpm-lock\.yaml$''',
    '''(^|\/)package-lock\.json$''',
    '''(^|\/)uv\.lock$''',
    '''(^|\/)go\.sum$''',
    '''(^|\/)\.env(\.example)?$''',
    '''(^|\/)\.gitleaks\.toml$''',
    '''(^|\/)tests?\/.*(fixture|mock|fake)''',
  ]
