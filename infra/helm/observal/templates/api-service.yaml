apiVersion: v1
kind: Service
metadata:
  name: {{ include "observal.fullname" . }}-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "observal.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
      name: http
  selector:
    {{- include "observal.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
