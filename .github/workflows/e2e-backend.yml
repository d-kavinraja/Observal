name: E2E Backend Integration

on:
  pull_request:
    branches: [main]

concurrency:
  group: e2e-backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    name: e2e-backend-integration
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Start Docker stack
        run: |
          cp .env.example .env
          make up
        env:
          DOCKER_BUILDKIT: 1

      - name: Wait for API health
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/health && exit 0
            sleep 2
          done
          echo "API not healthy" && exit 1

      - name: Run integration tests
        run: |
          cd observal-server
          uv run \
            --with pytest \
            --with pytest-asyncio \
            --with httpx \
            pytest ../tests/test_integration.py -v --asyncio-mode=auto
