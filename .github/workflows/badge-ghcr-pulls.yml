# Fetches combined GHCR pull counts for observal-api and observal-web by
# scraping the public package pages (no auth needed — the count is in the HTML).
# Writes a shields.io endpoint JSON to a Gist so the README badge stays live.
#
# One-time setup required:
#   1. Create a public Gist with a file named ghcr-pulls.json
#   2. Generate a PAT with scope: gist only
#   3. Add two repo secrets:
#        BADGE_GIST_ID    — the Gist ID (alphanumeric hash in the URL)
#        BADGE_GIST_TOKEN — the PAT created above

name: Update GHCR pulls badge

on:
  schedule:
    - cron: "0 3 * * *" # daily at 03:00 UTC
  release:
    types: [published]
  workflow_dispatch:

permissions: {}

jobs:
  update:
    name: Fetch counts and update Gist
    runs-on: ubuntu-latest

    steps:
      - name: Fetch pull counts from GHCR
        id: counts
        run: |
          python3 - <<'PY'
          import os, re, urllib.request, urllib.error
          
          def scrape_count(username, package):
              """Scrape download count from GitHub package page."""
              # Correct URL format: https://github.com/{username}/packages/container/{package}
              url = f"https://github.com/{username}/packages/container/{package}"
              req = urllib.request.Request(
                  url,
                  headers={"User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"}
              )
              try:
                  with urllib.request.urlopen(req) as resp:
                      html = resp.read().decode()
                  # Look for the download count in the HTML
                  # Pattern: looks for text like "Total downloads" followed by the count
                  match = re.search(r'Total\s+downloads?[^0-9]*([0-9,]+)', html, re.IGNORECASE)
                  if match:
                      count_str = match.group(1).replace(',', '')
                      return int(count_str)
                  return 0
              except urllib.error.HTTPError as e:
                  print(f"Error fetching {package}: HTTP {e.code}")
                  return 0
          
          api_count = scrape_count("blazeup-ai", "observal-api")
          web_count = scrape_count("blazeup-ai", "observal-web")
          total = api_count + web_count
          
          print(f"observal-api: {api_count}")
          print(f"observal-web: {web_count}")
          print(f"Total: {total}")
          
          if total >= 1_000_000:
              label = f"{total / 1_000_000:.1f}M"
          elif total >= 1_000:
              label = f"{total / 1_000:.1f}k"
          else:
              label = str(total)
          
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"label={label}\n")
              f.write(f"total={total}\n")
          PY

      - name: Write shields.io JSON to Gist
        env:
          GIST_TOKEN: ${{ secrets.BADGE_GIST_TOKEN }}
          GIST_ID: ${{ secrets.BADGE_GIST_ID }}
          LABEL: ${{ steps.counts.outputs.label }}
        run: |
          python3 - <<'PY'
          import os, json, urllib.request

          payload = {
              "files": {
                  "ghcr-pulls.json": {
                      "content": json.dumps({
                          "schemaVersion": 1,
                          "label": "GHCR pulls",
                          "message": os.environ["LABEL"],
                          "color": "0db7ed",
                          "namedLogo": "docker",
                          "logoColor": "white",
                      })
                  }
              }
          }

          req = urllib.request.Request(
              f"https://api.github.com/gists/{os.environ['GIST_ID']}",
              data=json.dumps(payload).encode(),
              headers={
                  "Authorization": f"token {os.environ['GIST_TOKEN']}",
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
              method="PATCH",
          )

          with urllib.request.urlopen(req) as resp:
              print(f"Gist updated: HTTP {resp.status}")
          PY
