# Fetches combined GHCR pull counts for observal-api and observal-web using the
# GitHub GraphQL API (requires authentication). Writes a shields.io endpoint JSON
# to a Gist so the README badge stays live.
#
# One-time setup required:
#   1. Create a public Gist with a file named ghcr-pulls.json
#   2. Generate a PAT with scope: gist, read:packages
#   3. Add two repo secrets:
#        BADGE_GIST_ID    — the Gist ID (alphanumeric hash in the URL)
#        BADGE_GIST_TOKEN — the PAT created above

name: Update GHCR pulls badge

on:
  schedule:
    - cron: "0 3 * * *" # daily at 03:00 UTC
  release:
    types: [published]
  workflow_dispatch:

permissions: {}

jobs:
  update:
    name: Fetch counts and update Gist
    runs-on: ubuntu-latest

    steps:
      - name: Fetch pull counts from GHCR
        id: counts
        env:
          GITHUB_TOKEN: ${{ secrets.BADGE_GIST_TOKEN }}
        run: |
          python3 - <<'PY'
          import os, json, urllib.request

          def get_package_pulls(owner, package):
              """Fetch pull count for a GHCR package using the REST API."""
              url = f"https://api.github.com/users/{owner}/packages/container/{package}/versions"
              req = urllib.request.Request(
                  url,
                  headers={
                      "Authorization": f"token {os.environ.get('GITHUB_TOKEN', '')}",
                      "Accept": "application/vnd.github+json",
                      "X-GitHub-Api-Version": "2022-11-28",
                      "User-Agent": "GitHub-Actions"
                  }
              )
              try:
                  with urllib.request.urlopen(req) as resp:
                      data = json.loads(resp.read().decode())
                      # Sum downloads across all versions
                      total_downloads = sum(
                          version.get("download_count", 0)
                          for version in data
                          if isinstance(data, list)
                      )
                      return total_downloads
              except urllib.error.HTTPError as e:
                  print(f"Error fetching {package}: HTTP {e.code}")
                  return 0

          api_count = get_package_pulls("blazeup-ai", "observal-api")
          web_count = get_package_pulls("blazeup-ai", "observal-web")
          total = api_count + web_count

          print(f"observal-api: {api_count}")
          print(f"observal-web: {web_count}")
          print(f"Total: {total}")

          if total >= 1_000_000:
              label = f"{total / 1_000_000:.1f}M"
          elif total >= 1_000:
              label = f"{total / 1_000:.1f}k"
          else:
              label = str(total)

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"label={label}\n")
              f.write(f"total={total}\n")
          PY

      - name: Write shields.io JSON to Gist
        env:
          GIST_TOKEN: ${{ secrets.BADGE_GIST_TOKEN }}
          GIST_ID: ${{ secrets.BADGE_GIST_ID }}
          LABEL: ${{ steps.counts.outputs.label }}
        run: |
          python3 - <<'PY'
          import os, json, urllib.request

          payload = {
              "files": {
                  "ghcr-pulls.json": {
                      "content": json.dumps({
                          "schemaVersion": 1,
                          "label": "GHCR pulls",
                          "message": os.environ["LABEL"],
                          "color": "0db7ed",
                          "namedLogo": "docker",
                          "logoColor": "white",
                      })
                  }
              }
          }

          req = urllib.request.Request(
              f"https://api.github.com/gists/{os.environ['GIST_ID']}",
              data=json.dumps(payload).encode(),
              headers={
                  "Authorization": f"token {os.environ['GIST_TOKEN']}",
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
              method="PATCH",
          )

          with urllib.request.urlopen(req) as resp:
              print(f"Gist updated: HTTP {resp.status}")
          PY
